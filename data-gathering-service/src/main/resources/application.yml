server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/autocomplete
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
